<div class="min-h-screen bg-stone-900 text-stone-100 font-sans">

  <!-- NAVBAR -->
  <nav class="bg-black/90 backdrop-blur border-b border-amber-500/30 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

      <!-- LOGO -->
      <h1 class="text-2xl font-extrabold tracking-tight text-amber-500">
        Barber<span class="text-stone-100">Shop</span>
      </h1>

      <!-- MENU DESKTOP -->
      <div class="hidden md:flex items-center space-x-10 font-medium">
        <a
          routerLink="/"
          routerLinkActive="text-amber-500"
          class="relative hover:text-amber-400 transition duration-300 after:absolute after:w-0 after:h-[2px] after:bg-amber-500 after:left-0 after:-bottom-1 hover:after:w-full after:transition-all">
          Inicio
        </a>

        <a
          routerLink="/gestion"
          routerLinkActive="text-amber-500"
          class="relative hover:text-amber-400 transition duration-300 after:absolute after:w-0 after:h-[2px] after:bg-amber-500 after:left-0 after:-bottom-1 hover:after:w-full after:transition-all">
          Agendar Cita
        </a>
      </div>

      <!-- BOTÓN MENÚ MÓVIL -->
      <button
        class="md:hidden text-amber-500 focus:outline-none"
        (click)="menuOpen = !menuOpen">

        <svg
          class="w-8 h-8 transition-transform duration-300"
          [class.rotate-90]="menuOpen"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24">

          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16">
          </path>
        </svg>
      </button>
    </div>

    <!-- MENU MÓVIL -->
    <div
      *ngIf="menuOpen"
      class="md:hidden bg-black border-t border-stone-800 px-6 py-6 space-y-4 animate-fade">

      <a
        routerLink="/"
        (click)="menuOpen = false"
        class="block text-lg hover:text-amber-400 transition">
        Inicio
      </a>

      <a
        routerLink="/gestion"
        (click)="menuOpen = false"
        class="block text-lg hover:text-amber-400 transition">
        Agendar Cita
      </a>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <main class="max-w-7xl mx-auto px-6 py-10">
    <router-outlet></router-outlet>
  </main>

</div>
