<div class="min-h-screen bg-[#050505] flex items-center justify-center px-4 relative overflow-hidden">

  <!-- Background effects -->
  <div class="absolute inset-0">
    <div
      class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-amber-500/8 rounded-full blur-[150px]">
    </div>
    <div class="absolute bottom-0 left-0 w-72 h-72 bg-violet-500/5 rounded-full blur-[100px]"></div>
  </div>

  <div class="relative w-full max-w-sm animate-scaleIn">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div
        class="w-14 h-14 rounded-2xl bg-gradient-to-br from-amber-500 to-amber-600 flex items-center justify-center mx-auto mb-5 shadow-2xl shadow-amber-500/25">
        <svg class="w-7 h-7 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
        </svg>
      </div>
      <h1 class="font-display text-2xl font-bold text-white tracking-tight">Panel de Administración</h1>
      <p class="text-zinc-500 text-sm mt-1.5">Corte & Clase</p>
    </div>

    <!-- Login Card -->
    <div class="glass-strong rounded-2xl p-8 space-y-5 glow-amber">

      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-zinc-400 uppercase tracking-widest">Usuario</label>
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-600">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
          </span>
          <input [(ngModel)]="usuario" type="text" placeholder="Ingresa tu usuario"
            class="w-full bg-black/40 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white text-sm placeholder-zinc-600 focus:outline-none focus:border-amber-500/50 transition-all duration-300">
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-zinc-400 uppercase tracking-widest">Contraseña</label>
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-600">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
            </svg>
          </span>
          <input [(ngModel)]="password" type="password" placeholder="••••••••"
            class="w-full bg-black/40 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white text-sm placeholder-zinc-600 focus:outline-none focus:border-amber-500/50 transition-all duration-300">
        </div>
      </div>

      <button (click)="login()" [disabled]="cargando"
        class="w-full bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 disabled:opacity-40 disabled:cursor-not-allowed text-black font-bold py-3 rounded-xl text-sm transition-all duration-300 shadow-lg shadow-amber-500/20 hover:shadow-amber-500/40 mt-2">
        {{ cargando ? 'Verificando...' : 'Ingresar' }}
      </button>

      <p *ngIf="error"
        class="text-red-400 text-sm text-center bg-red-500/10 border border-red-500/20 rounded-lg px-4 py-2.5">
        {{ error }}
      </p>
    </div>

    <div class="text-center mt-6">
      <a routerLink="/"
        class="text-zinc-600 hover:text-amber-500 text-sm transition-colors duration-300 inline-flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        Volver al inicio
      </a>
    </div>

  </div>
</div>
