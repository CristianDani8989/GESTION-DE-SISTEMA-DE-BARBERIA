<div class="min-h-screen bg-zinc-950 px-8 py-10 max-w-5xl mx-auto">

  <div class="mb-8">
    <p class="text-xs font-semibold text-indigo-400 uppercase tracking-[0.25em] mb-1">Administración</p>
    <h1 class="text-3xl font-bold text-zinc-100">Barberos</h1>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">

    <!-- Tabla -->
    <div class="lg:col-span-2 bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden">
      <div class="px-6 py-4 border-b border-zinc-800 flex items-center justify-between">
        <p class="text-xs font-semibold text-zinc-400 uppercase tracking-widest">Equipo</p>
        <span class="text-xs text-zinc-500 bg-zinc-800 border border-zinc-700 px-3 py-1 rounded-full">
          {{ barberos.length }} registrados
        </span>
      </div>

      <div *ngIf="cargando" class="px-6 py-16 text-center">
        <p class="text-zinc-600 text-sm animate-pulse">Cargando...</p>
      </div>

      <div *ngIf="!cargando && barberos.length === 0" class="px-6 py-16 text-center">
        <p class="text-zinc-600 text-sm">No hay barberos registrados</p>
      </div>

      <table *ngIf="!cargando && barberos.length > 0" class="w-full text-sm">
        <thead class="bg-zinc-950">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-semibold text-zinc-500 uppercase tracking-widest">Nombre</th>
            <th class="px-6 py-3 text-left text-xs font-semibold text-zinc-500 uppercase tracking-widest">Especialidad</th>
            <th class="px-6 py-3 text-center text-xs font-semibold text-zinc-500 uppercase tracking-widest">Acción</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-zinc-800">
          <tr *ngFor="let b of barberos" class="hover:bg-zinc-800/50 transition-colors">
            <td class="px-6 py-4 text-zinc-100 font-medium">{{ b.nombre }}</td>
            <td class="px-6 py-4 text-zinc-400">{{ b.especialidad }}</td>
            <td class="px-6 py-4 text-center">
              <button (click)="eliminarBarbero(b.id!)"
                class="text-xs font-semibold text-red-400 hover:text-red-300 bg-red-950/40 hover:bg-red-950/70 border border-red-900/50 px-3 py-1.5 rounded-md transition-colors">
                Eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Formulario -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden">
      <div class="px-6 py-4 border-b border-zinc-800">
        <p class="text-xs font-semibold text-zinc-400 uppercase tracking-widest">Nuevo Barbero</p>
      </div>
      <div class="p-6 space-y-4">
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-zinc-500 uppercase tracking-widest">Nombre completo</label>
          <input [(ngModel)]="nombre" type="text" placeholder="Ej: Carlos Mendoza"
            class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-4 py-2.5 text-zinc-100 text-sm placeholder-zinc-600 focus:outline-none focus:border-indigo-500 transition-colors">
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-zinc-500 uppercase tracking-widest">Especialidad</label>
          <input [(ngModel)]="especialidad" type="text" placeholder="Ej: Degradado y diseño"
            class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-4 py-2.5 text-zinc-100 text-sm placeholder-zinc-600 focus:outline-none focus:border-indigo-500 transition-colors">
        </div>
        <button (click)="agregarBarbero()"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
          Agregar barbero
        </button>
      </div>
    </div>

  </div>
</div>
