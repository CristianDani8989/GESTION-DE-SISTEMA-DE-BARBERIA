<div class="min-h-screen bg-[#050505] px-6 md:px-8 py-10 max-w-6xl mx-auto">

  <!-- Header -->
  <div class="flex items-end justify-between mb-8 animate-slideUp">
    <div>
      <span class="text-amber-500 text-xs font-semibold uppercase tracking-[0.25em] mb-2 block">Administración</span>
      <h1 class="font-display text-3xl font-bold text-white">Servicios</h1>
    </div>
    <span *ngIf="!cargando"
      class="text-xs text-amber-400 bg-amber-500/10 border border-amber-500/20 px-4 py-2 rounded-full font-semibold">
      {{ servicios.length }} servicios
    </span>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">

    <!-- Tabla -->
    <div class="lg:col-span-2 glass rounded-2xl overflow-hidden animate-slideUp">
      <div class="px-6 py-4 border-b border-white/5 flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-violet-500"></div>
        <p class="text-xs font-semibold text-zinc-400 uppercase tracking-widest">Catálogo</p>
      </div>

      <div *ngIf="cargando" class="px-6 py-20 text-center">
        <div class="w-8 h-8 border-2 border-amber-500/30 border-t-amber-500 rounded-full animate-spin mx-auto mb-3">
        </div>
        <p class="text-zinc-600 text-sm">Cargando...</p>
      </div>

      <div *ngIf="!cargando && servicios.length === 0" class="px-6 py-20 text-center">
        <div class="w-14 h-14 rounded-2xl bg-zinc-800/50 flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-zinc-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-7 7m7-7l-7-7" />
          </svg>
        </div>
        <p class="text-zinc-500 text-sm">No hay servicios registrados</p>
      </div>

      <table *ngIf="!cargando && servicios.length > 0" class="w-full text-sm">
        <thead>
          <tr class="border-b border-white/5">
            <th class="px-6 py-3.5 text-left text-xs font-semibold text-zinc-500 uppercase tracking-widest">Servicio
            </th>
            <th class="px-6 py-3.5 text-left text-xs font-semibold text-zinc-500 uppercase tracking-widest">Precio COP
            </th>
            <th class="px-6 py-3.5 text-center text-xs font-semibold text-zinc-500 uppercase tracking-widest">Acciones
            </th>
          </tr>
        </thead>
        <tbody class="divide-y divide-white/5">
          <tr *ngFor="let s of servicios" class="hover:bg-white/[0.03] transition-colors">
            <td class="px-6 py-4 text-white font-medium">{{ s.nombre }}</td>
            <td class="px-6 py-4">
              <span class="text-emerald-400 font-bold tabular-nums bg-emerald-500/10 px-3 py-1 rounded-lg">
                {{ s.precio | currency:'COP':'symbol-narrow':'1.0-0':'es-CO' }}
              </span>
            </td>
            <td class="px-6 py-4">
              <div class="flex items-center justify-center gap-2">
                <button (click)="editarPrecio(s)"
                  class="text-xs font-semibold text-amber-400 hover:text-amber-300 bg-amber-500/10 hover:bg-amber-500/20 border border-amber-500/20 px-3.5 py-1.5 rounded-lg transition-all duration-300">
                  Editar
                </button>
                <button (click)="eliminarServicio(s.id!)"
                  class="text-xs font-semibold text-red-400 hover:text-red-300 bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 px-3.5 py-1.5 rounded-lg transition-all duration-300">
                  Eliminar
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Formulario -->
    <div class="glass-strong rounded-2xl overflow-hidden animate-slideUp delay-200">
      <div class="px-6 py-4 border-b border-white/5 flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
        <p class="text-xs font-semibold text-zinc-400 uppercase tracking-widest">Nuevo Servicio</p>
      </div>
      <div class="p-6 space-y-4">
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-zinc-500 uppercase tracking-widest">Nombre</label>
          <input [(ngModel)]="nombre" type="text" placeholder="Ej: Corte clásico"
            class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-zinc-600 focus:outline-none focus:border-amber-500/50 transition-all duration-300">
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-zinc-500 uppercase tracking-widest">Precio en COP</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-amber-500 text-sm font-bold">$</span>
            <input [(ngModel)]="precio" type="number" placeholder="25000"
              class="w-full bg-black/40 border border-white/10 rounded-xl pl-8 pr-4 py-3 text-white text-sm placeholder-zinc-600 focus:outline-none focus:border-amber-500/50 transition-all duration-300">
          </div>
          <p class="text-xs text-zinc-600">Valor en pesos colombianos</p>
        </div>
        <button (click)="agregarServicio()"
          class="w-full bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-black font-bold py-3 rounded-xl text-sm transition-all duration-300 shadow-lg shadow-amber-500/20 hover:shadow-amber-500/40">
          + Agregar servicio
        </button>
      </div>
    </div>

  </div>
</div>
