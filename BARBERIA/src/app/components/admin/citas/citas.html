<div class="min-h-screen bg-zinc-950 px-8 py-10 max-w-6xl mx-auto">

  <div class="flex items-end justify-between mb-8">
    <div>
      <p class="text-xs font-semibold text-indigo-400 uppercase tracking-[0.25em] mb-1">Administración</p>
      <h1 class="text-3xl font-bold text-zinc-100">Gestión de Citas</h1>
    </div>
    <span *ngIf="!cargando" class="text-xs text-zinc-500 bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-full">
      {{ citas.length }} cita(s) registradas
    </span>
  </div>

  <div *ngIf="cargando" class="bg-zinc-900 border border-zinc-800 rounded-xl py-20 text-center">
    <p class="text-zinc-600 text-sm animate-pulse">Cargando citas...</p>
  </div>

  <div *ngIf="!cargando" class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden">

    <div *ngIf="citas.length === 0" class="py-20 text-center">
      <p class="text-zinc-600 text-sm">No hay citas registradas</p>
    </div>

    <table *ngIf="citas.length > 0" class="w-full text-sm">
      <thead class="bg-zinc-950">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-semibold text-zinc-500 uppercase tracking-widest">Cliente</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-zinc-500 uppercase tracking-widest">Barbero</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-zinc-500 uppercase tracking-widest">Servicio</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-zinc-500 uppercase tracking-widest">Fecha</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-zinc-500 uppercase tracking-widest">Hora</th>
          <th class="px-6 py-3 text-center text-xs font-semibold text-zinc-500 uppercase tracking-widest">Acción</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-zinc-800">
        <tr *ngFor="let c of citas" class="hover:bg-zinc-800/40 transition-colors">
          <td class="px-6 py-4 text-zinc-100 font-medium">{{ c.cliente }}</td>
          <td class="px-6 py-4 text-zinc-400">{{ c.barbero }}</td>
          <td class="px-6 py-4">
            <span class="text-xs font-medium text-indigo-300 bg-indigo-950/50 border border-indigo-900/50 px-2.5 py-1 rounded-md">
              {{ c.servicio }}
            </span>
          </td>
          <td class="px-6 py-4 text-zinc-400 tabular-nums">{{ c.fecha }}</td>
          <td class="px-6 py-4 text-zinc-400 tabular-nums">{{ c.hora }}</td>
          <td class="px-6 py-4 text-center">
            <button (click)="cancelarCita(c.id)"
              class="text-xs font-semibold text-red-400 hover:text-red-300 bg-red-950/40 hover:bg-red-950/70 border border-red-900/50 px-3 py-1.5 rounded-md transition-colors">
              Cancelar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
